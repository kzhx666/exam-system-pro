<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理后台</title>
    <style>
        body { font-family: sans-serif; background: #343a40; color: #fff; padding: 20px; }
        .panel { background: #fff; color: #333; padding: 20px; border-radius: 8px; max-width: 900px; margin: auto; }
        .hidden { display: none; }
        .history-item { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; }
        .analysis-box { background: #f8f9fa; border-left: 4px solid #17a2b8; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="login-box" class="panel" style="max-width: 300px; margin-top: 100px; text-align: center;">
        <h3>管理登录</h3>
        <input type="password" id="pwd" placeholder="密码" style="width:100%; margin-bottom:10px;">
        <button onclick="login()" style="width:100%;">进入系统</button>
    </div>

    <div id="admin-panel" class="panel hidden">
        <h2>发布新试题</h2>
        <textarea id="raw-data" style="width:100%; height:100px;" placeholder="输入题目JSON或文本..."></textarea>
        <button onclick="publish()" style="background:#28a745; color:#fff; padding:10px 20px; border:none; margin-top:10px;">发布并自动保存项目</button>
        
        <hr>
        <h2>历史项目 (题目保存区域)</h2>
        <div id="history-list"></div>
    </div>

    <div id="analysis-page" class="panel hidden">
        <button onclick="backToAdmin()" style="margin-bottom:10px;">返回列表</button>
        <h2 id="ana-title">试卷解析</h2>
        <div id="ana-content"></div>
    </div>

    <script>
        function login() {
            if(document.getElementById('pwd').value === '123456') { // 5. 管理页面登录
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadHistory();
            } else { alert("密码错误！"); }
        }

        async function publish() {
            // 简单模拟解析逻辑
            const data = {
                title: "新发布的测试卷",
                questions: [
                    {title: "题目1", options: ["A", "B"], answer: "A", analysis: "这里是解析1"},
                    {title: "题目2", options: ["C", "D"], answer: "D", analysis: "这里是解析2"}
                ]
            };
            await fetch('/api/publish', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert("发布成功，已保存至历史项目！");
            loadHistory();
        }

        async function loadHistory() {
            const res = await fetch('/api/history');
            const list = await res.json();
            document.getElementById('history-list').innerHTML = list.map(e => `
                <div class="history-item">
                    <span>${e.title} (${e.date})</span>
                    <button onclick="viewAnalysis('${e.id}')" style="background:#17a2b8; color:#fff; border:none; border-radius:3px;">查看答案与解析</button>
                </div>
            `).join('');
        }

        async function viewAnalysis(id) {
            const res = await fetch(`/api/exam/${id}?is_admin=true`);
            const data = await res.json();
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('analysis-page').classList.remove('hidden');
            document.getElementById('ana-title').innerText = data.title + " - 完整解析";
            document.getElementById('ana-content').innerHTML = data.questions.map(q => `
                <div style="margin-bottom:15px; border-bottom:1px solid #ddd; padding-bottom:10px;">
                    <strong>问：${q.title}</strong><br>
                    <span style="color:green;">正确答案：${q.answer}</span>
                    <div class="analysis-box">解析：${q.analysis}</div>
                </div>
            `).join('');
        }

        function backToAdmin() {
            document.getElementById('analysis-page').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
        }
    </script>
</body>
</html>
